<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Keyaan's Birthday World - A fun interactive birthday celebration">
    <meta name="theme-color" content="#ff9ecf">
    <title>🎉 Keyaan's Birthday World</title>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6ec6ff 0%, #ff9ecf 50%, #ffe066 100%);
            --dot-size: 18px;
            --key-size: 80px;
            --gap-size: 12px;
            --border-radius: 20px;
            --transition-speed: 0.3s;
            --shadow-light: 0 4px 12px rgba(0, 0, 0, 0.1);
            --shadow-deep: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive, system-ui, -apple-system, sans-serif;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: clamp(1.5rem, 5vw, 3rem);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .pinbox {
            display: flex;
            gap: var(--gap-size);
            justify-content: center;
            flex-wrap: wrap;
            animation: popIn 0.6s ease-out 0.2s both;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .dot {
            width: var(--dot-size);
            height: var(--dot-size);
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            box-shadow: var(--shadow-light);
            transition: opacity var(--transition-speed);
        }

        .dot.filled {
            opacity: 1;
            transform: scale(1.1);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, var(--key-size));
            gap: var(--gap-size);
            animation: popIn 0.6s ease-out 0.4s both;
        }

        .key {
            width: var(--key-size);
            height: var(--key-size);
            border: none;
            border-radius: var(--border-radius);
            font-size: clamp(1.5rem, 4vw, 1.75rem);
            background: white;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive, system-ui, sans-serif;
            box-shadow: var(--shadow-light);
            transition: all var(--transition-speed) ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .key:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-deep);
        }

        .key:active {
            transform: translateY(-2px) scale(0.98);
        }

        .key:focus {
            outline: 3px solid rgba(255, 255, 255, 0.8);
            outline-offset: 2px;
        }

        .key.delete {
            grid-column: 1 / 3;
            background: #ff6b6b;
            color: white;
            font-size: 1rem;
        }

        .key.submit {
            background: #51cf66;
            color: white;
        }

        .pin-input {
            font-size: 2rem;
            text-align: center;
            color: white;
            min-height: 50px;
            margin-bottom: 10px;
            letter-spacing: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            font-size: 1rem;
            min-height: 24px;
            margin-top: 10px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #birthday {
            display: none;
            text-align: center;
            color: white;
            animation: popIn 0.6s ease-out;
        }

        .birthday-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            max-width: 600px;
        }

        .birthday-message {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            line-height: 1.4;
        }

        .photo {
            width: min(280px, 90vw);
            max-width: 400px;
            height: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-deep);
            border: 8px solid white;
            animation: zoomIn 0.8s ease-out;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff9ecf;
            pointer-events: none;
        }

        .wishes {
            font-size: 1.1rem;
            line-height: 1.8;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }

        .reset-btn {
            padding: 12px 30px;
            font-size: 1rem;
            background: white;
            color: #ff9ecf;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive, system-ui, sans-serif;
            box-shadow: var(--shadow-light);
            transition: all var(--transition-speed);
            margin-top: 20px;
        }

        .reset-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-deep);
        }

        .reset-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            :root {
                --key-size: 70px;
                --dot-size: 14px;
            }

            h1 {
                margin-bottom: 20px;
            }

            .container {
                gap: 20px;
            }

            .keypad {
                gap: 8px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>🎂 Keyaan's Birthday World 🎉</h1>

        <div class="container">
            <div id="pin-entry">
                <div class="pinbox" id="pinbox" role="status" aria-live="polite" aria-label="PIN entry status">
                    <div class="dot" aria-hidden="true"></div>
                    <div class="dot" aria-hidden="true"></div>
                    <div class="dot" aria-hidden="true"></div>
                    <div class="dot" aria-hidden="true"></div>
                </div>

                <div class="pin-input" id="pin-display" aria-label="PIN input display">●●●●</div>

                <div class="keypad">
                    <button class="key" data-key="1" aria-label="Button 1">1</button>
                    <button class="key" data-key="2" aria-label="Button 2">2</button>
                    <button class="key" data-key="3" aria-label="Button 3">3</button>
                    <button class="key" data-key="4" aria-label="Button 4">4</button>
                    <button class="key" data-key="5" aria-label="Button 5">5</button>
                    <button class="key" data-key="6" aria-label="Button 6">6</button>
                    <button class="key" data-key="7" aria-label="Button 7">7</button>
                    <button class="key" data-key="8" aria-label="Button 8">8</button>
                    <button class="key" data-key="9" aria-label="Button 9">9</button>
                    <button class="key delete" id="delete-btn" aria-label="Delete last digit">← Delete</button>
                    <button class="key" data-key="0" aria-label="Button 0">0</button>
                    <button class="key submit" id="submit-btn" aria-label="Submit PIN">✓ Submit</button>
                </div>

                <div class="error-message" id="error-message" role="alert"></div>
            </div>

            <div id="birthday" role="region" aria-label="Birthday message">
                <div class="birthday-content">
                    <div class="birthday-message">🎈 Happy Birthday Keyaan! 🎈</div>
                    <img src="keyaan-birthday.jpg" alt="Keyaan's birthday photo" class="photo">
                    <div class="wishes">
                        Wishing you a day filled with joy, laughter, and unforgettable memories! 🌟<br><br>
                        May this year bring you endless happiness and success! 🎁✨
                    </div>
                    <button class="reset-btn" id="reset-btn">🔄 Try Again</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PIN = '2005'; // Change this to your desired PIN
        let currentPin = '';
        const dots = document.querySelectorAll('.dot');
        const pinDisplay = document.getElementById('pin-display');
        const errorMessage = document.getElementById('error-message');
        const pinEntry = document.getElementById('pin-entry');
        const birthdaySection = document.getElementById('birthday');
        const keys = document.querySelectorAll('.key');
        const deleteBtn = document.getElementById('delete-btn');
        const submitBtn = document.getElementById('submit-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Handle number key clicks
        keys.forEach(key => {
            if (key.dataset.key) {
                key.addEventListener('click', () => addDigit(key.dataset.key));
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (/^\d$/.test(e.key)) {
                addDigit(e.key);
            } else if (e.key === 'Backspace') {
                deleteDigit();
            } else if (e.key === 'Enter') {
                verifyPin();
            }
        });

        // Delete button
        deleteBtn.addEventListener('click', deleteDigit);

        // Submit button
        submitBtn.addEventListener('click', verifyPin);

        // Reset button
        resetBtn.addEventListener('click', resetPage);

        function addDigit(digit) {
            if (currentPin.length < 4) {
                currentPin += digit;
                updateDisplay();
                errorMessage.textContent = '';
                playSound('click');
            }
        }

        function deleteDigit() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDisplay();
                playSound('delete');
            }
        }

        function updateDisplay() {
            const displayText = '●'.repeat(currentPin.length) + '●'.repeat(4 - currentPin.length);
            pinDisplay.textContent = displayText;

            // Update dots
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function verifyPin() {
            if (currentPin.length !== 4) {
                errorMessage.textContent = '❌ PIN must be 4 digits';
                playSound('error');
                return;
            }

            if (currentPin === CORRECT_PIN) {
                playSound('success');
                showBirthdayMessage();
                createConfetti();
            } else {
                errorMessage.textContent = '❌ Wrong PIN! Try again.';
                currentPin = '';
                updateDisplay();
                playSound('error');
            }
        }

        function showBirthdayMessage() {
            pinEntry.style.display = 'none';
            birthdaySection.style.display = 'block';
        }

        function resetPage() {
            currentPin = '';
            updateDisplay();
            errorMessage.textContent = '';
            pinEntry.style.display = 'block';
            birthdaySection.style.display = 'none';
        }

        function playSound(type) {
            // Create a simple beep using Web Audio API
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                if (type === 'click') {
                    oscillator.frequency.value = 800;
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                } else if (type === 'success') {
                    oscillator.frequency.value = 1200;
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                } else if (type === 'error') {
                    oscillator.frequency.value = 400;
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                }
            } catch (e) {
                // Audio context not supported, continue without sound
                console.debug('Audio not available:', e);
            }
        }

        function createConfetti() {
            const colors = ['#ff9ecf', '#6ec6ff', '#ffe066', '#51cf66', '#a78bfa'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `fall ${2 + Math.random() * 1}s linear`;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Add confetti animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(720deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
